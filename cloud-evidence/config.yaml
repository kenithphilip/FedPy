# cloud-evidence collector config.
# Edit this file to define what the collector will inspect.
# The collector is strictly read-only — see README and core/readonly-guardrail.ts.

frmr_version: "0.9.43-beta"

# FedRAMP impact tier to evaluate against: low | moderate | high.
#   - low / moderate come from the 20x machine-readable requirements.
#   - high is DERIVED from the NIST 800-53 Rev5 baseline (no 20x High is published);
#     High findings are labeled `derived-rev5` so an assessor never mistakes them for
#     a published 20x High obligation.
# The selected tier decides which of the 223 requirements are in scope and at what
# obligation strength (MUST/SHOULD/MAY). Override at runtime with --impact-level
# or the CLOUD_EVIDENCE_IMPACT_LEVEL env var. Defaults to moderate if omitted.
impact_level: moderate

# AWS configuration
aws:
  enabled: true
  # Phase 1: single account via the runner's default profile / SSO session.
  # The collector reads AWS_PROFILE and AWS_REGION from the environment.
  # Multi-account assume-role is planned for a later phase.
  regions:
    - us-east-1
  # If you tag resources to separate prod from nonprod, set this so the
  # collector can filter findings to the relevant env.
  prod_tag:
    key: env
    values: [prod, production]

# GCP configuration
gcp:
  enabled: true
  # Phase 1: ADC. Run `gcloud auth application-default login` once before invoking.
  # Service-account impersonation is planned for a later phase.
  organization_id: null           # set to "organizations/123456789012" if you have org-level read access
  projects:                       # list of project IDs to inspect
    - your-prod-project-id
  prod_label:
    key: env
    values: [prod, production]

# Azure configuration (optional — omit the whole block to disable)
azure:
  enabled: false
  # Subscription IDs the collector will inspect. With Reader at the management-group
  # level you can list them all; otherwise enumerate the ones you have access to.
  subscriptions: []
  # Optional tenant id (the credential chain auto-discovers it, but pin if needed).
  tenant_id: null
  # Tag-based prod filter (mirror of aws.prod_tag / gcp.prod_label).
  prod_tag:
    key: env
    values: [prod, production]

# Output directory (relative to this file)
output_dir: ./out

# ─── NIST SSDF + CISA Common Form (LOOP-T) ─────────────────────────────────────
# Only consumed when an SSDF flag is set:
#   --ssdf-attestation   → T.T2 per-practice satisfaction matrix
#   --ssdf-common-form   → T.T3 CISA Secure Software Development Attestation
#                          Common Form (OMB 1670-0052) PDF + signed JSON
# Edit the templated values below to your organization's real identifiers before
# emitting the Common Form for submission. The system never substitutes a default
# that looks like real data (REO Rule 4); missing required fields raise a loud
# MissingOperatorInputError naming the exact YAML path.
ssdf:
  # Optional human label for the attestation regime (free text).
  regime: "OMB M-22-18 as amended by M-23-16"
  # ── T.T5 — NIST SP 800-218A SSDF-AI extension (all optional) ──
  # When ai_augmentation_enabled is true AND --ssdf-attestation is set AND at
  # least one model card under out/model-cards/ (LOOP-O.O5) is in AI scope, the
  # orchestrator augments the T.T2 matrix with the 800-218A R/C/N items for
  # AI-bearing products. Default false — with LOOP-O.O5 unshipped there are no
  # model cards, so the step no-ops (coverage:skipped).
  ai_augmentation_enabled: false
  # Which committed 800-218A catalogue to treat as primary. Default 'IPD' per the
  # T.T5 spec brief; 'final' selects the canonical July-2024 publication. The
  # emitted delta sidecar + drift threshold surface any IPD-vs-final divergence.
  primary_catalogue: IPD
  # Optional explicit in-scope product allow-list. Empty ⇒ auto-detect from every
  # model card whose ai_use_case is non-empty (or is a dual-use foundation model).
  ai_products_in_scope: []
  # Products assessed by the T.T2 satisfaction matrix (one matrix per product).
  # The T.T4 re-attestation cadence / material-change detector (also gated by
  # --ssdf-attestation) reads the OPTIONAL fields below. When `regime` is absent
  # the internal review cadence is not computed (a requires-operator-input
  # diagnostic names the field — REO Rule 4, never a fabricated default); when
  # `federal_agencies` is empty no per-agency cadence rows are emitted.
  products:
    - id: your-product-id
      name: "Your Cloud Service Offering"
      ai_enabled: false
      critical_software: false
      # T.T4 (optional) — annual re-attestation cadence + per-agency tracking.
      # regime: one of m-22-18-mandatory | m-23-16-extended | m-26-05-tailored | post-m-26-05-future
      regime: null
      continuous_delivery: false
      major_version_pattern: "^(\\d+)\\.0\\.0$"   # SBOM version regex → major-version-bump event
      cadence_override_days: null                 # positive int overrides the regime default
      poam_extension_allowed: true                # M-22-18 §III.E POA&M-in-lieu-of-attestation safety valve
      federal_agencies: []                        # e.g. [{ id: dot, name: "U.S. Department of Transportation" }]
  # Corporate producer block consumed by the T.T3 Common Form emitter. Every
  # field marked REQUIRED below must be filled before --ssdf-common-form will emit.
  producer:
    legal_name: "Your Company, Inc."          # REQUIRED
    dba_name: null                            # optional
    address:                                  # all four lines REQUIRED (country defaults to US)
      street: "123 Example Ave"
      city: "Reston"
      state: "VA"
      postal_code: "20190"
      country: "US"
    point_of_contact:                         # name/title/email/phone REQUIRED
      name: "Jane Doe"
      title: "Chief Information Security Officer"
      email: "ciso@your-company.example"
      phone: "+1-703-555-0100"
    signatory:                                # name/title REQUIRED; the human signs the PDF out of band
      name: "John Smith"
      title: "Chief Executive Officer"
    scope_of_attestation:                     # >=1 product REQUIRED; cross-checked against the T.T2 matrices
      products:
        - name: "Your Cloud Service Offering"
          version: "2026.6.1"
          cpe: "cpe:2.3:a:your_company:cloud_service_offering:2026.6.1:*:*:*:*:*:*:*"
    ai_profile: false                         # set true to emit the SP 800-218A informational appendix
    poam_reference_overrides: {}              # optional: { "4": ["<poam-item-uuid>", ...] } per CISA practice

# ─── Configuration Management Plan (LOOP-C.C1) ─────────────────────────────────
# Only consumed when --cmp is set. The CMP (cmp.docx) auto-fills §4 Configuration
# Items from real inventory.json (CM-8) and §7 Configuration Monitoring from
# core/ksi-map.ts; the process-narrative fields below are operator-supplied.
# When omitted, each renders a verbatim REQUIRES-OPERATOR-INPUT marker in the
# document (REO Rule 4 — the system never fabricates workflow language).
# CLI flags / env vars (--cmp-approval-narrative etc.) override these values.
cmp:
  # §6 change-control workflow narrative (CM-3 + CM-4).
  approval_narrative: null
  # §9 role authorized to order a rollback + the criteria that trigger one.
  rollback_authority: null
  # §8 approved maintenance / change windows.
  change_windows: null
  # §5 link to the CM-2 Baseline Configuration document (LOOP-C.C9). Defaults to
  # ./baseline-config.docx when C.C9 is emitted in the same run.
  baseline_config_href: null
  # §3 Configuration Control Board roster (NIST SP 800-128 §2.1 roles). Each entry
  # is verbatim operator input; omit the whole list to get REQUIRES-OPERATOR-INPUT rows.
  ccb_roster: []
    # - role: "CCB Chair"
    #   name: "Jane Doe"
    #   organization: "Your Company — Security Engineering"
    #   email: "ccb-chair@your-company.example"
  # §10 configuration-management tooling actually in use. Omit to let the emitter
  # infer cloud-native tooling from the inventory provider set (marked
  # REQUIRES-OPERATOR-INPUT-VERIFY until you confirm it here).
  tooling: []
    # - name: "AWS Systems Manager"
    #   purpose: "Automated configuration + patch/state compliance for AWS resources"
