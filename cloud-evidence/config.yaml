# cloud-evidence collector config.
# Edit this file to define what the collector will inspect.
# The collector is strictly read-only — see README and core/readonly-guardrail.ts.

frmr_version: "0.9.43-beta"

# FedRAMP impact tier to evaluate against: low | moderate | high.
#   - low / moderate come from the 20x machine-readable requirements.
#   - high is DERIVED from the NIST 800-53 Rev5 baseline (no 20x High is published);
#     High findings are labeled `derived-rev5` so an assessor never mistakes them for
#     a published 20x High obligation.
# The selected tier decides which of the 223 requirements are in scope and at what
# obligation strength (MUST/SHOULD/MAY). Override at runtime with --impact-level
# or the CLOUD_EVIDENCE_IMPACT_LEVEL env var. Defaults to moderate if omitted.
impact_level: moderate

# AWS configuration
aws:
  enabled: true
  # Phase 1: single account via the runner's default profile / SSO session.
  # The collector reads AWS_PROFILE and AWS_REGION from the environment.
  # Multi-account assume-role is planned for a later phase.
  regions:
    - us-east-1
  # If you tag resources to separate prod from nonprod, set this so the
  # collector can filter findings to the relevant env.
  prod_tag:
    key: env
    values: [prod, production]

# GCP configuration
gcp:
  enabled: true
  # Phase 1: ADC. Run `gcloud auth application-default login` once before invoking.
  # Service-account impersonation is planned for a later phase.
  organization_id: null           # set to "organizations/123456789012" if you have org-level read access
  projects:                       # list of project IDs to inspect
    - your-prod-project-id
  prod_label:
    key: env
    values: [prod, production]

# Output directory (relative to this file)
output_dir: ./out
